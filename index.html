<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Boot</title>
<style>
    @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');

    body, html {
        margin: 0;
        padding: 0;
        height: 100vh;
        background: #000;
        color: #c0c0c0;
        font-family: 'VT323', monospace;
        overflow: hidden;
    }

    .crt-container {
        position: relative;
        width: 100%;
        height: 100vh;
        padding: 80px 80px 40px 100px;
        box-sizing: border-box;
        overflow: hidden;
    }

    .dos-screen {
        position: absolute;
        top: 80px;
        left: 100px;
        width: 620px;
        height: calc(100vh - 160px);
        overflow: hidden;
    }

    .image-container {
        position: absolute;
        top: 60px;
        right: 80px;
        width: 220px;
        height: 180px;
        opacity: 0;
        transition: opacity 0.6s ease-in;
        z-index: 10;
    }

    .image-container img {
        width: 100%;
        height: 100%;
        object-fit: contain;
        image-rendering: pixelated;
    }

    .line {
        opacity: 0;
        transition: opacity 0.8s ease-in;
        margin-bottom: 6px;
        font-size: 26px;
        white-space: pre;
    }

    .line.visible {
        opacity: 1;
    }

    .cursor {
        display: inline-block;
        width: 13px;
        height: 26px;
        background: #c0c0c0;
        animation: blink 0.6s step-end infinite;
        vertical-align: middle;
    }

    .start-screen {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        text-align: center;
        font-size: 32px;
        cursor: pointer;
        user-select: none;
        z-index: 100;
    }

    .start-screen:hover {
        color: #ffffff;
    }

    @keyframes blink {
        50% { opacity: 0; }
    }
</style>
</head>
<body>
 
<div class="crt-container" id="crt">
    <div class="start-screen" id="start-btn">
        <br><br><br>
        Unable to Start Personal Computer<br>
        <span style="font-size:22px; opacity:0.7;">click here to start</span>
    </div>
    <div class="dos-screen" id="dos-screen"></div>
    <div class="image-container" id="logo-container">
        <img id="logo-img" src="" alt="">
    </div>
</div>
<audio id="bootAudio">
    <source src="https://files.catbox.moe/py2hdx.m4a" type="audio/mpeg">
</audio>
<script> 
const bootLines = [
"Microsoft Windows 95",
"(C) Copyright Microsoft Corp 1981-2001",
"Starting system...",
"Loading /win98 ..... OK",
"Loading /toolkat ..... OK",
"Initializing hardware ..... OK",
"Loading .css Files ..... OK",
"Loading .js Files ..... OK",
"Starting Windows...",
"Welcome to meetniko.fyi",
"C:\WINDOWS> _",
    ""
];
const crt = document.getElementById('crt'); 
const dosScreen = document.getElementById('dos-screen');
const logoContainer = document.getElementById('logo-container');
const logoImg = document.getElementById('logo-img');
const audio = document.getElementById('bootAudio');

let started = false;
const logoURL = "https://files.catbox.moe/xjyvld.png";
const modernTerminalURL = "terminal.html";

function addLine(text) {
    const div = document.createElement('div');
    div.className = 'line';
    div.textContent = text || " ";
    dosScreen.appendChild(div);
    
    setTimeout(() => div.classList.add('visible'), 50);
}

function bootSequence() {
    dosScreen.innerHTML = '';
    let i = 0;

    const interval = setInterval(() => {
        if (i < bootLines.length) {
            addLine(bootLines[i]);
            i++;
        } else {
            clearInterval(interval);
            const cursorLine = document.createElement('div');
            cursorLine.innerHTML = 'C:\\><span class="cursor"></span>';
            dosScreen.appendChild(cursorLine);
        }
    }, 650);
}

function startBoot() {
    if (started) return;
    started = true;

    document.getElementById('start-btn').style.display = 'none';

    audio.play().catch(e => console.log("Audio playback failed:", e));

    setTimeout(() => {
        bootSequence();
        if (logoURL) {
            logoImg.src = logoURL;
            logoContainer.style.opacity = '1';
        }
    }, 2525);
    setTimeout(() => {
        window.location.href = "https://meetniko.fyi/2";
    }, 17000);
}
window.onload = () => {
    document.getElementById('start-btn').addEventListener('click', startBoot);
};
</script>

</body>
</html>
