<!DOCTYPE html>
<html lang="en">
<head>

    <style>
        body {

            color: #d1c7ff;
            font-family: system-ui, sans-serif;
            padding: 2rem 1rem;
            max-width: 500px;
            margin: 0 auto;
            line-height: 1.6;
        }
        
        h1 {
            color: #e0d9ff;
            font-size: 2rem;
        }
        
        .tagline {
            color: #9b7cff;
            margin: 0.5rem 0 2rem;
        }

        }
        
        .socials {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;

        }
        
        .social-btn {
            color: #c8bfff;
            text-decoration: none;
            padding: 10px 20px;
            border: 1px solid #5a4a8c;
            border-radius: 6px;
        }
        
        .social-btn:hover {
            background: #7b4dff;
            color: white;
        }
        
        footer {
            text-align: center;

            color: #665c8c;

        }
