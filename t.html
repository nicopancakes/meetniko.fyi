<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Secure Access</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e2937 100%);
      color: #e2e8f0;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .login-container {
      background: rgba(15, 23, 42, 0.95);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(148, 163, 184, 0.2);
      border-radius: 20px;
      padding: 48px 40px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.4);
      text-align: center;
    }

    .logo {
      width: 64px;
      height: 64px;
      background: linear-gradient(45deg, #3b82f6, #6366f1);
      border-radius: 16px;
      margin: 0 auto 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      font-weight: 700;
      color: white;
    }

    h1 {
      font-size: 28px;
      font-weight: 600;
      margin-bottom: 8px;
    }

    p {
      color: #94a3b8;
      font-size: 15px;
      margin-bottom: 32px;
    }

    .input-group {
      position: relative;
      margin-bottom: 24px;
    }

    input {
      width: 100%;
      padding: 16px 20px;
      background: #1e2937;
      border: 1px solid #475569;
      border-radius: 12px;
      color: #e2e8f0;
      font-size: 16px;
      transition: all 0.3s ease;
    }

    input:focus {
      outline: none;
      border-color: #6366f1;
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15);
    }

    button {
      width: 100%;
      padding: 16px;
      background: linear-gradient(45deg, #6366f1, #3b82f6);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.3);
    }

    .status {
      margin-top: 20px;
      font-size: 14px;
      min-height: 20px;
    }

    .error { color: #f87171; }
    .success { color: #34d399; }
  </style>
</head>
<body>

  <div class="login-container">
    <div class="logo">🚀</div>
    <h1>App Login</h1>
    <p>Enter your Page Code to continue</p>

    <form id="loginForm">
      <div class="input-group">
        <input 
          type="text" 
          id="codeword" 
          placeholder="Enter Code"  
          autocomplete="off"
          required
        >
      </div>

      <button type="submit">Load Page Code</button>
    </form>

    <div id="status" class="status"></div>
  </div>

  <script>
    const form = document.getElementById('loginForm');
    const codeInput = document.getElementById('codeword');
    const statusEl = document.getElementById('status');

    // Load last used codeword
    const lastCodeword = localStorage.getItem('lastCodeword');
    if (lastCodeword) {
      codeInput.value = lastCodeword;
    }

    // Optional: Save geolocation + last codeword
    function saveGeolocation(codeword) {
      if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(
          (position) => {
            const geoData = {
              codeword: codeword,
              latitude: position.coords.latitude,
              longitude: position.coords.longitude,
              timestamp: new Date().toISOString(),
              accuracy: position.coords.accuracy
            };
            localStorage.setItem('lastAccessGeo', JSON.stringify(geoData));
            console.log('Geolocation saved:', geoData);
          },
          (error) => {
            console.log('Geolocation permission denied or unavailable');
            // Still save the codeword even without geo
            localStorage.setItem('lastCodeword', codeword);
          }
        );
      }
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const codeword = codeInput.value.trim();
      if (!codeword) {
        showStatus('Please enter a codeword', 'error');
        return;
      }

      showStatus('Loading secure content...', 'success');

      const url = `https://raw.githubusercontent.com/nicopancakes/MA/refs/heads/main/${encodeURIComponent(codeword)}.html`;

      try {
        const response = await fetch(url);
        
        if (!response.ok) {
          throw new Error(`HTTP ${response.status} - Invalid codeword or file not found`);
        }

        const htmlContent = await response.text();

        // Save codeword and attempt to save geolocation
        localStorage.setItem('lastCodeword', codeword);
        saveGeolocation(codeword);

        // Replace entire page with the fetched HTML
        document.open();
        document.write(htmlContent);
        document.close();

      } catch (err) {
        console.error(err);
        showStatus('Failed to load: ' + err.message, 'error');
      }
    });

    function showStatus(message, type) {
      statusEl.textContent = message;
      statusEl.className = `status ${type}`;
      
      // Auto-clear after 5 seconds
      setTimeout(() => {
        if (statusEl.textContent === message) {
          statusEl.textContent = '';
        }
      }, 5000);
    }

    // Bonus: Allow pressing Enter on input
    codeInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        form.dispatchEvent(new Event('submit'));
      }
    });
  </script>
</body>
</html>
